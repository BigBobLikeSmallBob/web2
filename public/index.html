<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuyển dụng</title>
    <link rel="stylesheet" href="css/landing.css">
</head>
<body>
    <header class="hero">
        <div class="container hero-content">
            <h1 id="company-name">Đang tải...</h1>
            <p id="hero-tagline" class="tagline"></p>
            <a href="#job-list-section" class="btn-primary-outline">Xem vị trí đang tuyển</a>
        </div>
    </header>

    <main class="container">
        <section id="job-list-section" class="info-section">
            <div class="about-us">
                <h2>Về chúng tôi</h2>
                <p id="company-description"></p>
            </div>
            <div class="section-header">
                <h2>Vị trí đang tuyển dụng</h2>
            </div>
            <div id="job-cards-container" class="job-grid">
                <div class="loading">Đang tải danh sách việc làm...</div>
            </div>
        </section>

        <section id="job-detail-section" class="info-section" style="display: none;">
            <button onclick="backToJobList()" class="btn-ghost">← Quay lại danh sách</button>
            <div class="jd-content">
                <h2 id="jd-title">Tiêu đề công việc</h2>
                <div class="jd-meta">
                    <span id="jd-salary" class="salary"></span>
                    <span id="jd-location"></span>
                </div>
                <div class="jd-body">
                    <h3>Mô tả công việc</h3>
                    <p>Chúng tôi đang tìm kiếm ứng viên tài năng...</p>
                </div>
                <button id="apply-now-btn" class="btn-primary">Ứng tuyển ngay</button>
            </div>
        </section>

        <section id="application-section" class="form-section" style="display: none;">
            <button type="button" onclick="backToJD()" class="btn-ghost" style="margin-bottom: 20px;">← Quay lại chi tiết</button>
            <h2>Gửi hồ sơ ứng tuyển</h2>
            <div id="form-banner" class="banner"></div>            
            <form id="application-form">
                <div class="form-group">
                    <label for="fullName">Họ và tên *</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="position">Vị trí ứng tuyển *</label>
                    <input type="text" id="position" name="position" readonly required>
                </div>
                <div class="form-group">
                    <label>CV của bạn (PDF, DOC, DOCX) *</label>
                    <label for="cv" id="file-drop-label" class="file-drop">
                        <span id="file-drop-text">Chọn file PDF, DOC hoặc DOCX</span>
                        <input type="file" id="cv" name="cv" accept=".pdf,.doc,.docx" hidden>
                    </label>
                </div>
                <button type="submit" id="submit-btn" class="btn-primary">Gửi hồ sơ</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p id="footer-address"></p>
            <p>Email: <span id="footer-email"></span> | Hotline: <span id="footer-phone"></span></p>
        </div>
    </footer>
    <script src="js/Main.js"></script>
</body>
</html>
